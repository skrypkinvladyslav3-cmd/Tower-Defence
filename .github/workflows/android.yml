name: Android Build
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer dependencies
        run: |
          sudo apt update
          # Полный фарш инструментов для компиляции
          sudo apt install -y git zip unzip autoconf automake libtool m4 autotools-dev \
            build-essential pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo6 cmake libffi-dev libssl-dev help2man
          pip install --upgrade pip
          pip install --upgrade setuptools wheel
          pip install buildozer cython

      - name: Build with Buildozer
        # Оставляем только одну команду, без чистки
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk